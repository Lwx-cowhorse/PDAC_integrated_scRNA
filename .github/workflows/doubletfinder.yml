name: DoubletFinder QC Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: read

jobs:
  doubletfinder:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # Seurat+harmony+DoubletFinder整套装下来+跑pipeline，默认360分钟上限够，但单job给3小时上限避免卡死耗光额度

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: true   # 如果 .rds 是用 git-lfs 提交的，这行是必须的，否则checkout下来的只是LFS指针文件(几百字节)而非真实数据，后面cp/读取会直接出错。如果没用LFS可以删掉这行。

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.2'
          use-public-rspm: true   # 关键修复：启用Posit Package Manager的预编译二进制仓库。不开这个，Seurat/harmony/igraph等几十个依赖会在Ubuntu上从源码编译，既慢又极易因为缺某个系统库而报错，这是此类pipeline在Linux CI上最常见的失败原因。

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential gfortran cmake pkg-config \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libhdf5-dev libuv1-dev libgit2-dev \
            libcairo2-dev libxt-dev \
            libharfbuzz-dev libfribidi-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev \
            libblas-dev liblapack-dev liblzma-dev libbz2-dev \
            libglpk-dev libgmp-dev
          # 这些是 Seurat / harmony / DoubletFinder 整条依赖链（含 textshaping、ragg、igraph、Rcpp 系）
          # 在 Ubuntu 上常见的编译期缺失项，即使有 RSPM 二进制，部分包运行时仍需要这些动态库。

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-${{ runner.os }}-4.3.2-${{ hashFiles('.github/workflows/doubletfinder.yml') }}
          restore-keys: |
            r-pkgs-${{ runner.os }}-4.3.2-

      - name: Install R packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          options(Ncpus = parallel::detectCores())

          install.packages("remotes", repos = "https://cloud.r-project.org")

          # 关键修复：CRAN当前Matrix(>=1.7-0)要求 R>=4.4.0，而我们钉死的是R 4.3.2，
          # 直接 install.packages("Matrix") 会报 "dependency 'Matrix' is not available"，
          # 进而连带 Seurat/DoubletFinder 一起装不上。CRAN为R 4.3.x保留的最后兼容版本是1.6-5，必须显式钉版本。
          remotes::install_version("Matrix", version = "1.6-5", repos = "https://cloud.r-project.org", upgrade = "never")

          install.packages(c("dplyr", "ggplot2", "patchwork"), repos = "https://cloud.r-project.org")
          install.packages(c("Seurat", "harmony"), repos = "https://cloud.r-project.org")

          remotes::install_github(
            "chris-mcginnis-ucsf/DoubletFinder",   # 修复：原来写的 uoft 是错的用户名，正确仓库是 ucsf
            auth_token = Sys.getenv("GITHUB_PAT"),
            force = TRUE,              # 官方README推荐写法
            upgrade = "never",        # 不要因为DoubletFinder的依赖声明而重新编译已装好的Matrix/Seurat
            dependencies = TRUE,
            build_vignettes = FALSE
          )
        shell: Rscript {0}

      - name: Session info (for debugging)
        run: |
          options(width = 120)
          sessionInfo()
          cat("\nSeurat version:", as.character(packageVersion("Seurat")), "\n")
          cat("DoubletFinder installed:", "DoubletFinder" %in% rownames(installed.packages()), "\n")
        shell: Rscript {0}

      - name: Prepare data directories
        run: |
          mkdir -p result/step2/try2.0
          shopt -s nullglob
          rds_files=(*.rds)
          if [ ${#rds_files[@]} -eq 0 ]; then
            echo "::error::仓库根目录下没有找到 .rds 文件。请确认：1) 输入数据是否已经通过 git-lfs 提交到仓库；2) 文件是否在根目录而不是子目录；3) 是否需要改成在前置步骤里从其他来源(云盘/GEO/上一个workflow的artifact)下载。"
            exit 1
          fi
          cp *.rds result/step2/try2.0/
          ls -lh result/step2/try2.0/

      - name: Run DoubletFinder pipeline
        run: Rscript step2/05_scRNA_QC_doublet.R

      - name: Upload result
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PDAC_integrated_scRNA
          path: result/step2/try2.0/PDAC_integrated_scRNA.rds

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            result/step2/try2.0/
          retention-days: 3
