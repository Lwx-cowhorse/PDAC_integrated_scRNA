name: DoubletFinder QC Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

jobs:
  doubletfinder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.2'

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: /home/runner/work/_temp/Library
          key: r-pkgs-${{ hashFiles('.github/workflows/doubletfinder.yml') }}

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libhdf5-dev libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          install.packages(c("remotes", "dplyr", "ggplot2", "patchwork"), repos = "https://cloud.r-project.org")
          install.packages(c("Seurat", "harmony"), repos = "https://cloud.r-project.org")
          remotes::install_github("chris-mcginnis-uoft/DoubletFinder")
        shell: Rscript {0}

      - name: Prepare data directories
        run: |
          mkdir -p result/step2/try2.0
          cp *.rds result/step2/try2.0/

      - name: Run DoubletFinder pipeline
        run: Rscript step2/05_scRNA_QC_doublet.R

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: PDAC_integrated_scRNA
          path: result/step2/try2.0/PDAC_integrated_scRNA.rds
